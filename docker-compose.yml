# ============================================================
#  docker compose up -d  一键启动全部服务
#  docker compose down   停止并清理
#  前端 → http://localhost
#  后端 → http://localhost:8080
#  Knife4j 文档 → http://localhost:8080/doc.html
# ============================================================

services:
  # ====== MySQL ======
  mysql:
    image: mysql:8.0
    container_name: um-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
      MYSQL_DATABASE: user_management
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====== Redis ======
  redis:
    image: redis:7-alpine
    container_name: um-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ====== MinIO ======
  minio:
    image: minio/minio:latest
    container_name: um-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ====== Spring Boot 后端 ======
  backend:
    build: ./backend
    container_name: um-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_URL: jdbc:mysql://mysql:3306/user_management?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: user-management
      JWT_SECRET: ${JWT_SECRET:-UserManagement-JWT-SecretKey-2026-Prod-Change-Me!}
    ports:
      - "8080:8080"

  # ====== React 前端 ======
  frontend:
    build: ./frontend
    container_name: um-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data:
  minio_data:
